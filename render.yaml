services:
  # ─── Django Backend (Web Service) ───────────────────────────────────────────
  - type: web
    name: productive-flow-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py migrate"
    startCommand: "cd backend && daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: productive-flow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*" # Set to your actual domain later for security
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: GOOGLE_API_KEY
        sync: false # Set manually in Render Dashboard
      - key: FRONTEND_URL
        sync: false # Set manually in Render Dashboard to your frontend deployed URL

  # ─── React Frontend (Static Site) ───────────────────────────────────────────
  - type: web
    name: productive-flow-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: productive-flow-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"

databases:
  - name: productive-flow-db
    region: oregon
    plan: free
