services:
  # ─── Django Backend (Web Service) ───────────────────────────────────────────
  - type: web
    name: trello-clone-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "./render_build.sh"
    startCommand: "cd backend && gunicorn config.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: trello-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*" # Set to your actual domain later for security
      - key: CORS_ALLOWED_ORIGINS
        value: "https://trello-clone-frontend.onrender.com" # Placeholder
      - key: GOOGLE_API_KEY
        sync: false # Set manually in Render Dashboard

  # ─── React Frontend (Static Site) ───────────────────────────────────────────
  - type: web
    name: trello-clone-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://trello-clone-backend.onrender.com/api/"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"

databases:
  - name: trello-db
    region: oregon
    plan: free
