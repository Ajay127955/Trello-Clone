<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Your Email</title>
</head>
<body style="margin:0;padding:0;background:#f4f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">
          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#0747A6,#0052CC);padding:40px 48px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:24px;font-weight:700;letter-spacing:-0.5px;">Productive Flow</h1>
              <p style="margin:8px 0 0;color:rgba(255,255,255,0.75);font-size:14px;">Email Verification</p>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:48px;">
              <h2 style="margin:0 0 16px;color:#091E42;font-size:22px;font-weight:700;">Verify your email address</h2>
              <p style="margin:0 0 32px;color:#5E6C84;font-size:15px;line-height:1.6;">
                Use the code below to complete your registration. This code expires in <strong>10 minutes</strong>.
              </p>

              <!-- OTP Code -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:32px;">
                <tr>
                  <td align="center" style="background:#f4f5f7;border-radius:12px;padding:32px;">
                    <p style="margin:0 0 8px;color:#5E6C84;font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;">Your verification code</p>
                    <p style="margin:0;color:#0052CC;font-size:48px;font-weight:800;letter-spacing:12px;font-family:'Courier New',monospace;">{{ otp }}</p>
                  </td>
                </tr>
              </table>

              <p style="margin:0;color:#97A0AF;font-size:13px;line-height:1.6;">
                If you didn't request this code, you can safely ignore this email.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background:#f8f9fa;padding:24px 48px;text-align:center;border-top:1px solid #ebecf0;">
              <p style="margin:0;color:#97A0AF;font-size:12px;">© 2025 Productive Flow. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
